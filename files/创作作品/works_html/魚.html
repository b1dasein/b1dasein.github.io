<div class="back"><a href="../../../index.html#works">← 作品集</a></div>
<div class="container">
<div class="label">诗歌</div>
<h1>魚</h1>
<div class="content">
      <p>2021/3</p>
      <p>我覺得</p>
      <p>也許我是一條魚</p>
      <p>陸地上的生活太悶了</p>
      <p>這是我坐在湖邊常常想到的事</p>
      <p>這裏的事情 一件都不能讓我冒出泡泡</p>
      <p>我不喜歡湖水</p>
      <p>湖邊也不像是我該呆的地方</p>
      <p>有過被淘汰到海邊的死魚</p>
      <p>卻沒有聽說過坐在湖邊的魚</p>
      <p>陸地上沒有氧氣</p>
      <p>於是想到回到水裡的事</p>
      <p>確切的說 是</p>
      <p>回到海裡</p>

</div>
</div>
