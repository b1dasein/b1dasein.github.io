<h1>致中文系</h1>
<div class="content">
      <p>——对“新生代诗群”的戏拟</p>
      <p>2022/11</p>
      <p>文学院培养话语的复印机，</p>
      <p>一眼望去</p>
      <p>是语辞的海。</p>
      <p>符号</p>
      <p>堆叠成陌生化的样貌，索绪尔</p>
      <p>诨名唤作逻各斯。女性主义者的拳头</p>
      <p>打不进层叠的奥林匹斯山，存进银行的</p>
      <p>弗洛伊德与哈姆雷特在贬值，那</p>
      <p>咱们干脆取消文艺货币流通，</p>
      <p>让所有叙事统统都去见鬼吧，前提是</p>
      <p>要看得懂德里达，入场券</p>
      <p>就塞在埃克尔德街某所房子的某个缝隙里，</p>
      <p>不要害怕断裂，迷失</p>
      <p>在语义场里，淹没</p>
      <p>在语境中。教授说，</p>
      <p>中文人们，</p>
      <p>请忘记上岸这回事。</p>

</div>
